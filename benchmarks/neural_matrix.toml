# Phase 3b neural benchmark matrix.
# Each row runs once; results write to benchmark-results-neural/<timestamp>/{results.csv, summary.md}.
#
# kind="neural" rows require a trained checkpoint and use hybrid_attack
#   (neural prefix peeling + SAT suffix).  If the checkpoint is missing the row
#   is recorded with status="SKIP_MISSING_CHECKPOINT" and the runner continues.
#
# kind="sat" rows use the Phase 1 pure-SAT attack (no checkpoint needed).
#
# Reproduce full matrix:
#   1. Pull (or train) checkpoints:
#      hf download cahlen/keeloq-neural-distinguishers d64.pt --local-dir checkpoints/
#      # d96.pt and d128.pt are NOT available — see docs/phase3b-results/ambition_outcome.md
#      # for why (architectural signal horizon at depth ~88).
#   2. Run the matrix:
#      uv run python -m benchmarks.bench_neural
#
# Note on neural_target_bits: for d64.pt (trained at depth 56 for 64-round attack),
# the Gohr-pattern sweet spot is K=8 — peel 8 rounds back to the trained depth where
# the distinguisher actually has signal. Peeling further (e.g. K=32) degrades signal
# because the distinguisher sees depths outside its training regime, and backtrack
# cannot recover — producing BACKTRACK_EXHAUSTED.

# Neural-hybrid at the Gohr sweet spot (K=8). Reproduces the regression-test config.
[[run]]
name              = "64r-neural-hybrid-K8"
kind              = "neural"
rounds            = 64
num_pairs         = 8
checkpoint        = "checkpoints/d64.pt"
beam_width        = 16
neural_target_bits = 8
sat_timeout_s     = 120.0
max_backtracks    = 16

# Neural-hybrid at an over-aggressive peel (K=32) — documents the failure mode.
# Expected: BACKTRACK_EXHAUSTED after ~10 s, because the distinguisher loses signal
# well before reaching the trained depth 56 from the attack depth 64.
[[run]]
name              = "64r-neural-hybrid-K32-over-aggressive"
kind              = "neural"
rounds            = 64
num_pairs         = 8
checkpoint        = "checkpoints/d64.pt"
beam_width        = 16
neural_target_bits = 32
sat_timeout_s     = 120.0
max_backtracks    = 16

# Pure-SAT baseline at 64 rounds. Phase 1 demonstrated this runs in <0.3 s.
[[run]]
name              = "64r-sat-pure"
kind              = "sat"
rounds            = 64
num_pairs         = 4
hint_bits         = 0
encoder           = "xor"
solver            = "cryptominisat"
timeout_s         = 300.0

# 96r / 128r neural-hybrid rows — expected to SKIP_MISSING_CHECKPOINT because d96.pt
# and d128.pt are not produced (see ambition_outcome.md). Kept in the matrix so the
# skip rows visibly represent the negative result.
[[run]]
name              = "96r-neural-hybrid-UNAVAILABLE"
kind              = "neural"
rounds            = 96
num_pairs         = 8
checkpoint        = "checkpoints/d96.pt"
beam_width        = 16
neural_target_bits = 8
sat_timeout_s     = 300.0
max_backtracks    = 16

[[run]]
name              = "128r-neural-hybrid-UNAVAILABLE"
kind              = "neural"
rounds            = 128
num_pairs         = 8
checkpoint        = "checkpoints/d128.pt"
beam_width        = 16
neural_target_bits = 8
sat_timeout_s     = 600.0
max_backtracks    = 16
